<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Shared SVG gradient pool — must be first in body so all url(#id) refs resolve -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true" focusable="false">
    <defs>
      <!-- Gemini: purple→blue→cyan radial gradient -->
      <radialGradient id="gm0" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(16.1326 5.4553 -43.70045 129.2322 1.588 6.503)">
        <stop offset=".067" stop-color="#9168C0"/>
        <stop offset=".343" stop-color="#5684D1"/>
        <stop offset=".672" stop-color="#1BA1E3"/>
      </radialGradient>
      <!-- Copilot: six brand gradients -->
      <radialGradient id="cp0" cx="85.44%" cy="100.653%" fx="85.44%" fy="100.653%" r="105.116%" gradientTransform="scale(-.8553 -1) rotate(50.927 2.041 -1.946)">
        <stop offset="9.6%" stop-color="#00AEFF"/><stop offset="77.3%" stop-color="#2253CE"/><stop offset="100%" stop-color="#0736C4"/>
      </radialGradient>
      <radialGradient id="cp1" cx="18.143%" cy="32.928%" fx="18.143%" fy="32.928%" r="95.612%" gradientTransform="scale(.8897 1) rotate(52.069 .193 .352)">
        <stop offset="0%" stop-color="#FFB657"/><stop offset="63.4%" stop-color="#FF5F3D"/><stop offset="92.3%" stop-color="#C02B3C"/>
      </radialGradient>
      <radialGradient id="cp4" cx="82.987%" cy="-9.792%" fx="82.987%" fy="-9.792%" r="140.622%" gradientTransform="scale(-1 -.9441) rotate(-70.872 .142 1.17)">
        <stop offset="6.6%" stop-color="#8C48FF"/><stop offset="50%" stop-color="#F2598A"/><stop offset="89.6%" stop-color="#FFB152"/>
      </radialGradient>
      <linearGradient id="cp2" x1="39.465%" x2="46.884%" y1="12.117%" y2="103.774%">
        <stop offset="15.6%" stop-color="#0D91E1"/><stop offset="48.7%" stop-color="#52B471"/><stop offset="65.2%" stop-color="#98BD42"/><stop offset="93.7%" stop-color="#FFC800"/>
      </linearGradient>
      <linearGradient id="cp3" x1="45.949%" x2="50%" y1="0%" y2="100%">
        <stop offset="0%" stop-color="#3DCBFF"/><stop offset="24.7%" stop-color="#0588F7" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="cp5" x1="83.507%" x2="83.453%" y1="-6.106%" y2="21.131%">
        <stop offset="5.8%" stop-color="#F8ADFA"/><stop offset="70.8%" stop-color="#A86EDD" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>

  <h3 style="display: flex; justify-content: space-between; align-items: center; margin-top: 0;">
    <span id="appTitle"></span>
    <div id="modeToggle" class="mode-toggle">
      <div class="mode-toggle-pill"></div>
      <button id="modeFolderBtn" class="mode-toggle-btn mode-toggle-btn--active">📁</button>
      <button id="modePromptBtn" class="mode-toggle-btn">📝</button>
    </div>
  </h3>

  <div id="folderModeContainer">
    <div style="display: flex; gap: 8px; margin-bottom: 10px; position: relative; align-items: center;">
      <input type="text" id="searchInput" style="margin-bottom: 0; flex-grow: 1; height: 32px;">
      <div class="dropdown-container" style="height: 32px;">
        <button id="sortToggleBtn" class="secondary-btn" style="margin: 0; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">⇅</button>
        <div id="sortMenu" class="custom-dropdown">
          <div class="dropdown-item" data-value="dateDesc" id="sortNewest"></div>
          <div class="dropdown-item" data-value="dateAsc" id="sortOldest"></div>
          <div class="dropdown-item" data-value="alphaAsc" id="sortAlpha"></div>
        </div>
      </div>
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 10px;">
      <button id="toggleAddPanelBtn" class="main-btn" style="margin: 0; padding: 0 10px; height: 32px; font-size: 13px; flex-grow: 1;"></button>
      <button id="newFolderBtn" class="secondary-btn" style="margin: 0; padding: 0 8px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; white-space: nowrap;">+ 📁</button>
    </div>

    <div id="addConversationPanel" style="display: none; background: var(--folder-bg); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 10px;">
      <input type="text" id="folderName" style="margin-bottom: 8px;">
      <input type="text" id="chatTitle" style="margin-bottom: 8px;">
      <button id="saveBtn" class="main-btn" style="margin: 0; padding: 6px; font-size: 13px;"></button>
    </div>

    <div id="status"></div>
    <hr style="margin-top: 0; margin-bottom: 10px;">
    <div id="folderList"></div>
    <div id="noResults"></div>

    <div id="bulkActionBar">
      <span id="bulkCount" style="font-size: 13px; font-weight: 600; color: var(--accent-color);">0 selected</span>
      <div style="display: flex; gap: 6px; align-items: center;">
        <select id="bulkMoveSelect"></select>
        <button id="bulkDeleteBtn" title="Delete" style="background: var(--delete-color); color: white; border: none; padding: 4px 8px; border-radius: 6px; cursor: pointer;">🗑️</button>
        <button id="bulkCancelBtn" class="secondary-btn" style="padding: 4px 8px; height: 28px;">✕</button>
      </div>
    </div>
  </div>

  <div id="promptModeContainer" style="display: none;">
    <div style="display: flex; gap: 8px; margin-bottom: 10px; position: relative; align-items: center;">
      <input type="text" id="promptSearchInput" style="margin-bottom: 0; flex-grow: 1; height: 32px;">
      <div class="dropdown-container" style="height: 32px;">
        <button id="promptSortToggleBtn" class="secondary-btn" style="margin: 0; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;">⇅</button>
        <div id="promptSortMenu" class="custom-dropdown">
          <div class="dropdown-item" data-value="dateDesc" id="promptSortNewest"></div>
          <div class="dropdown-item" data-value="dateAsc" id="promptSortOldest"></div>
          <div class="dropdown-item" data-value="alphaAsc" id="promptSortAlpha"></div>
        </div>
      </div>
    </div>

    <!-- Add prompt button + per-site new conversation buttons -->
    <div style="display: flex; gap: 4px; margin-bottom: 10px; align-items: center; flex-wrap: wrap;">
      <button id="toggleAddPromptPanelBtn" class="main-btn" style="margin: 0; padding: 0 10px; height: 32px; font-size: 13px; flex-grow: 1; min-width: 80px;"></button>
      <button class="site-new-conv-btn" data-site="gemini" id="newConvGemini"></button>
      <button class="site-new-conv-btn" data-site="claude" id="newConvClaude"></button>
      <button class="site-new-conv-btn" data-site="chatgpt" id="newConvChatgpt"></button>
      <button class="site-new-conv-btn" data-site="copilot" id="newConvCopilot"></button>
      <button class="site-new-conv-btn" data-site="perplexity" id="newConvPerplexity"></button>
      <button class="site-new-conv-btn site-new-conv-btn--local" data-site="local" id="newConvLocal"></button>
    </div>

    <div id="addPromptPanel" style="display: none; background: var(--folder-bg); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); margin-bottom: 10px;">
      <div style="display: flex; gap: 8px; margin-bottom: 8px;">
        <input type="text" id="promptTitle" placeholder="" style="flex-grow: 1; margin-bottom: 0; height: 32px;">
        <button id="savePromptBtn" class="main-btn" style="margin: 0; padding: 0 10px; height: 32px; font-size: 13px;"></button>
      </div>
      <textarea id="promptText" placeholder="" style="width: 100%; height: 80px; margin-bottom: 0; resize: vertical; padding: 8px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); font-family: inherit; box-sizing: border-box;"></textarea>
    </div>

    <div id="promptStatus"></div>
    <hr style="margin-top: 0; margin-bottom: 10px;">
    <div id="promptList"></div>
  </div>

  <div class="footer-actions" style="align-items: center;">
    <label id="syncBookmarksLabel" style="display: flex; align-items: center; gap: 4px; cursor: pointer; margin: 0;" title="Mobile sync">
      <input type="checkbox" id="syncBookmarksToggle" class="chat-checkbox" style="margin: 0; cursor: pointer;">
      <span style="font-size: 14px;">📱</span>
    </label>
    <label id="syncPromptsLabel" style="display: none; align-items: center; gap: 4px; cursor: pointer; margin: 0;">
      <input type="checkbox" id="syncPromptsToggle" class="chat-checkbox" style="margin: 0; cursor: pointer;">
      <span style="font-size: 14px;">☁️</span>
    </label>
    <button id="exportBtn" class="secondary-btn"></button>

    <div class="storage-container" id="storageTooltip" title="">
      <div class="storage-bar">
        <div id="storageFill" class="storage-fill"></div>
      </div>
    </div>

    <button id="importBtn" class="secondary-btn"></button>
    <input type="file" id="importFile" accept=".json" style="position: absolute; left: -9999px; opacity: 0;" tabindex="-1">
    <a href="https://github.com/dlamarre-dev/GeminiFolders" target="_blank" id="githubLink" style="display: flex; align-items: center; color: var(--text-color); opacity: 0.6; transition: opacity 0.2s; text-decoration: none;">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
      </svg>
    </a>
  </div>

  <script src="lz-string.min.js"></script>
  <script src="utils.js"></script>
  <script src="site-config.js"></script>
  <script src="ui.js"></script>
  <script src="folders.js"></script>
  <script src="bulk-actions.js"></script>
  <script src="popup.js"></script>

  <div id="customModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <h3 id="modalTitle">Title</h3>
      <p id="modalMessage" style="display: none;"></p>
      <input type="text" id="modalInput" style="display: none;" autocomplete="off">
      <div class="modal-actions">
        <button id="modalBtnCancel" class="secondary-btn">Cancel</button>
        <button id="modalBtnConfirm" class="secondary-btn">Confirm</button>
      </div>
    </div>
  </div>
</body>
</html>
